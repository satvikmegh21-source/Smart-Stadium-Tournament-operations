name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_stadium
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    # 1. Setup Backend
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Generate Prisma Types
      run: |
        cd backend
        npx prisma generate
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_stadium?schema=public

    - name: Compile Backend
      run: |
        cd backend
        npm run build

    - name: Run Backend Tests
      run: |
        cd backend
        npm run test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_stadium?schema=public
        ACCESS_TOKEN_SECRET: ci_access_token_secret_value_123456
        REFRESH_TOKEN_SECRET: ci_refresh_token_secret_value_123456

    # 2. Setup Frontend
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Compile Frontend Next.js App
      run: |
        cd frontend
        npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
